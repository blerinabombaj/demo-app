name: pipeline

on:
  push:
    branches: [main]

# ── CHANGE REQUIRED ────────────────────────────────────────────────────────────
# IMAGE is built from your GitHub org/username automatically via github.repository_owner.
# No change needed here — but you MUST set two repo secrets (Settings → Secrets → Actions):
#   ARGOCD_SERVER  → your ArgoCD hostname, e.g. argocd.example.com  (no https://, no trailing slash)
#   ARGOCD_TOKEN   → an ArgoCD API token (ArgoCD UI → Settings → Accounts → your account → Generate Token)
# GITHUB_TOKEN is provided automatically by GitHub — do NOT create it manually.
# ───────────────────────────────────────────────────────────────────────────────

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/demo-app

jobs:

  # ── Stage 1: Lint ─────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # ── Stage 2: Trivy scan ───────────────────────────────────────────────────
  scan:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image locally for scanning
        run: docker build -t ${{ env.IMAGE }}:scan .

      - name: Trivy — fail on HIGH or CRITICAL
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          exit-code: "1"          # non-zero = pipeline blocks here
          severity: HIGH,CRITICAL

  # ── Stage 3: Build & push ─────────────────────────────────────────────────
  build-push:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (sha tag + latest)
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # ── Stage 4: ArgoCD sync ──────────────────────────────────────────────────
  argocd-sync:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Trigger sync
        run: |
          argocd app sync demo-app \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure

      - name: Wait for healthy
        run: |
          argocd app wait demo-app \
            --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} \
            --insecure \
            --health \
            --timeout 120
